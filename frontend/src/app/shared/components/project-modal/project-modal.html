<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [showHeader]="false"
  [dismissableMask]="true"
  [style]="{ width: '100vw', height: '100vh', maxHeight: '100vh', margin: '0' }"
  [contentStyle]="{ padding: '0', backgroundColor: '#050505' }"
  styleClass="project-modal"
  (onHide)="hide()"
>
  @if (project) {
    <div #modalContent class="w-full h-full flex flex-col md:flex-row relative opacity-0">
      <!-- Close Button -->
      <button
        (click)="hide()"
        class="absolute top-6 right-6 z-50 w-12 h-12 rounded-full bg-cinematic-black/50 border border-glass backdrop-blur-md flex items-center justify-center text-white hover:text-cinematic-teal hover:border-cinematic-teal/50 transition-colors"
        aria-label="Close modal"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.5"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>

      <!-- Video Player Area -->
      <div class="flex-grow h-[50vh] md:h-full bg-black relative flex items-center justify-center">
        @if (safeVideoUrl) {
          <iframe
            [src]="safeVideoUrl"
            class="w-full h-full absolute inset-0"
            frameborder="0"
            allow="autoplay; fullscreen; picture-in-picture"
            allowfullscreen
          >
          </iframe>
        } @else {
          <div class="text-white/30 text-sm tracking-widest font-light">VIDEO NOT AVAILABLE</div>
        }
      </div>

      <!-- Technical Specs Panel -->
      <div
        class="w-full md:w-[400px] lg:w-[480px] h-[50vh] md:h-full bg-cinematic-black border-l border-glass p-8 md:p-12 overflow-y-auto flex flex-col"
      >
        <div class="spec-item opacity-0 mb-4">
          <span class="text-cinematic-teal text-xs font-bold tracking-widest uppercase">{{
            project.category
          }}</span>
        </div>

        <h2 class="spec-item opacity-0 text-3xl font-bold mb-8 leading-tight">
          {{ project.title }}
        </h2>

        <div class="space-y-8 flex-grow">
          <div class="spec-item opacity-0">
            <h3 class="text-xs font-light text-white/40 uppercase tracking-widest mb-2">Role</h3>
            <p class="text-lg">{{ project.role }}</p>
          </div>

          <div class="spec-item opacity-0">
            <h3 class="text-xs font-light text-white/40 uppercase tracking-widest mb-2">Year</h3>
            <p class="text-lg">{{ project.year }}</p>
          </div>

          <div class="spec-item opacity-0">
            <h3 class="text-xs font-light text-white/40 uppercase tracking-widest mb-4">
              Technical Specs
            </h3>
            <ul class="space-y-3">
              @for (gear of project.gear; track gear) {
                <li class="flex items-start gap-3 text-white/80 font-light">
                  <span
                    class="w-1.5 h-1.5 rounded-full bg-glass border border-white/20 mt-2 flex-shrink-0"
                  ></span>
                  <span>{{ gear }}</span>
                </li>
              }
            </ul>
          </div>
        </div>
      </div>
    </div>
  }
</p-dialog>
