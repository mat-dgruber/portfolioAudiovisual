<section id="services" class="py-32 px-6 md:px-12 lg:px-24">
  <div class="max-w-7xl mx-auto">
    <div class="mb-20">
      <span class="text-cinematic-teal text-sm font-bold tracking-widest uppercase mb-2 block"
        >Capabilities</span
      >
      <h2
        class="text-4xl md:text-5xl font-bold flex flex-col md:flex-row md:items-end justify-between gap-6 border-b border-glass pb-8"
      >
        <span>CORE EXPERTISE</span>
        <span
          class="text-sm text-white/40 font-light tracking-normal max-w-sm text-left md:text-right"
        >
          End-to-end production focused on delivering uncompromising visual quality.
        </span>
      </h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      @for (service of services; track service.id) {
        <div
          #serviceCard
          class="glass-card p-10 group hover:border-cinematic-teal/30 transition-colors duration-500 opacity-0"
        >
          <div
            class="w-14 h-14 rounded-full bg-cinematic-teal/10 flex items-center justify-center mb-8 text-cinematic-teal group-hover:scale-110 transition-transform duration-500"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.5"
                [attr.d]="service.icon"
              ></path>
            </svg>
          </div>

          <span
            class="text-white/20 font-bold text-5xl mb-4 block group-hover:text-cinematic-teal/20 transition-colors"
            >{{ service.id }}</span
          >

          <h3 class="text-2xl font-bold mb-4 tracking-tight">{{ service.title }}</h3>

          <p class="text-white/60 font-light leading-relaxed">
            {{ service.description }}
          </p>
        </div>
      }
    </div>
  </div>
</section>
