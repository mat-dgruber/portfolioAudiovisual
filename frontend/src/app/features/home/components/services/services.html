<section id="services" class="py-32 px-6 md:px-12 lg:px-24">
  <div class="max-w-7xl mx-auto">
    <div class="mb-20 opacity-0" #sectionTitle>
      <span class="text-cinematic-teal text-sm font-bold tracking-widest uppercase mb-2 block"
        >Especialidades</span
      >
      <h2
        class="text-4xl md:text-5xl font-bold flex flex-col md:flex-row md:items-end justify-between gap-6 border-b border-glass pb-8"
      >
        <span>SERVIÇOS CENTRAIS</span>
        <span
          class="text-sm text-white/40 font-light tracking-normal max-w-sm text-left md:text-right"
        >
          Produção de ponta a ponta focada em entregar qualidade visual impecável e sem concessões.
        </span>
      </h2>
    </div>

    <!-- Modified Grid to match the reference: Box around the items, single line separators -->
    <div class="border border-glass rounded-2xl overflow-hidden glass-card">
      <div class="grid grid-cols-1 md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-glass">
        @for (service of services; track service.id) {
          <div
            #serviceCard
            class="p-10 lg:p-12 group hover:bg-white/[0.02] transition-colors duration-500 opacity-0 flex flex-col h-full"
          >
            <div
              class="w-12 h-12 rounded-full border border-glass bg-transparent flex items-center justify-center mb-10 text-white/40 group-hover:text-cinematic-teal group-hover:border-cinematic-teal/30 transition-all duration-500"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.5"
                  [attr.d]="service.icon"
                ></path>
              </svg>
            </div>

            <div class="flex items-center justify-between mb-6">
              <h3 class="text-2xl font-bold tracking-tight text-white group-hover:text-cinematic-teal transition-colors">
                {{ service.title }}
              </h3>
            </div>

            <p class="text-white/50 font-light leading-relaxed mb-8 flex-grow">
              {{ service.description }}
            </p>

            <div class="text-cinematic-teal/30 font-bold text-6xl block group-hover:text-cinematic-teal/10 transition-colors mt-auto">
              {{ service.id }}
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
