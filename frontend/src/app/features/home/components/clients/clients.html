<section id="clients" class="py-24 bg-cinematic-grey/30 border-y border-glass">
  <div class="max-w-7xl mx-auto px-6 md:px-12 lg:px-24">
    <div class="text-center mb-16">
      <span class="text-white/40 text-sm font-bold tracking-widest uppercase block"
        >Trusted By</span
      >
    </div>

    <!-- Client Logos Strip -->
    <div class="flex flex-wrap justify-center gap-12 md:gap-20 opacity-60">
      @for (client of clients; track client) {
        <div #clientLogo class="text-xl md:text-3xl font-bold tracking-tighter opacity-0">
          {{ client }}
        </div>
      }
    </div>

    <!-- Testimonials (Minimal) -->
    <div class="mt-32 max-w-4xl mx-auto">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
        @for (testimonial of testimonials; track testimonial.author) {
          <div class="relative">
            <svg
              class="absolute -top-6 -left-6 w-12 h-12 text-cinematic-teal/20"
              fill="currentColor"
              viewBox="0 0 32 32"
            >
              <path
                d="M10 8c-3.3 0-6 2.7-6 6v10h10V14H8c0-1.1.9-2 2-2V8zm18 0c-3.3 0-6 2.7-6 6v10h10V14h-6c0-1.1.9-2 2-2V8z"
              />
            </svg>
            <p class="text-xl font-light text-white/90 leading-relaxed relative z-10 mb-6">
              "{{ testimonial.quote }}"
            </p>
            <div class="flex items-center gap-4">
              <div
                class="w-10 h-10 rounded-full bg-cinematic-grey border border-glass flex items-center justify-center text-sm font-bold"
              >
                {{ testimonial.author.charAt(0) }}
              </div>
              <div>
                <h4 class="font-bold text-sm">{{ testimonial.author }}</h4>
                <p class="text-xs text-cinematic-teal">{{ testimonial.role }}</p>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
