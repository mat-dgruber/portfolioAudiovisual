<section class="relative h-screen w-full flex items-center justify-center overflow-hidden bg-black">
  <!-- YouTube Cinematic Video Background / Mobile Optimized -->
  <div class="absolute inset-0 z-0 bg-black pointer-events-none overflow-hidden">
    @if (isMobile()) {
      <!-- Static optimized image for mobile -->
      <img 
        src="assets/michael-henry-5OyGRn_r9Y4-unsplash.jpg" 
        alt="Cinematic Background" 
        class="w-full h-full object-cover opacity-60 scale-105 animate-slow-zoom"
      />
    } @else {
      <!-- Heavy iframe only for desktop -->
      <iframe
        class="absolute top-1/2 left-1/2 w-[300vw] h-[300vh] md:w-[150vw] md:h-[150vh] -translate-x-1/2 -translate-y-1/2 opacity-70 mix-blend-screen scale-125 z-10"
        src="https://www.youtube-nocookie.com/embed/Sgxbx65IDeM?autoplay=1&mute=1&controls=0&loop=1&playlist=Sgxbx65IDeM&playsinline=1&rel=0&showinfo=0&disablekb=1&modestbranding=1&iv_load_policy=3&fs=0"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen
      >
      </iframe>
    }
  </div>

  <!-- Hero Content (Starts hidden, animated via TS) -->
  <div class="relative z-10 text-center px-4 max-w-4xl pt-16">
    <h1
      #heroTitle
      class="text-5xl md:text-7xl lg:text-8xl font-bold mb-6 tracking-tight drop-shadow-2xl opacity-0"
    >
      AUTORIDADE <span class="text-cinematic-teal">SILENCIOSA</span>
    </h1>
    <p
      #heroDesc
      class="text-lg md:text-xl text-white/90 mb-10 max-w-2xl mx-auto font-medium leading-relaxed drop-shadow-lg opacity-0"
    >
      Narrativa audiovisual de alto padrão para marcas e projetos visionários. Edição precisa. Visão
      cinematográfica.
    </p>

    <div #heroButtons class="flex flex-col md:flex-row items-center justify-center gap-4 opacity-0">
      <button
        type="button"
        onclick="document.getElementById('projects')?.scrollIntoView({ behavior: 'smooth' })"
        class="liquid-pill hover:bg-white/10 transition-all font-bold tracking-widest text-sm text-cinematic-teal shadow-xl cursor-pointer"
      >
        VER PROJETOS
      </button>
      <button
        type="button"
        onclick="document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' })"
        class="liquid-pill hover:bg-white/10 transition-all font-bold tracking-widest text-sm text-white/80 shadow-xl cursor-pointer"
      >
        VAMOS TRABALHAR JUNTOS
      </button>
    </div>
  </div>

  <!-- Bottom fade for smooth transition to grid -->
  <div
    class="absolute bottom-0 left-0 w-full h-40 bg-gradient-to-t from-cinematic-black to-transparent z-10 pointer-events-none"
  ></div>
</section>
